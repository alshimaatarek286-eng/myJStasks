<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="description" content="product" />
        <title>Product Display System </title>
        <style>
         
            body {
            margin-top: 100px;
            font-family: Tahoma, Arial;
            background: #f5f7fa;
            color: #5a475a;
            text-align: center;
            direction: itr;
        }
            h1 { color: #ba97be; }
            .searchBox {
            width: 250px;
            padding: 8px;
            font-size: 14px;
            margin: 10px;
            border: 1px solid #aaa;
            border-radius: 5px;
        }
            li {
            background-color: rgb(216, 187, 215);
            width: 200px;         
            margin: 10px auto;   
            padding: 15px;       
            border-radius: 10px; 
            border: 1px solid #262227d2;
        }
            button {
            padding: 8px 15px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #b693b3;
            color: white;
            font-size: 14px;
        }

        
        </style>
        
    </head>
    
        <h1><u>Product Display System </u></h1>
        <form  onsubmit=" return false;"  >
            <div>
            <input type="text" id="research" placeholder="Enter name or price of the product";/>
            
            <button type="button"  onclick="filters()">filter</button>
            </div>    
        </form>
            <br>
            <ul id="productList">
                <li>Camera<br>500</li>
            <br>
                <li>Keyboard<br>100</li>
            <br>
                <li>Computer<br>2000</li>
            <br>
                <li>Laptop<br>1000</li>
            </ul>
    <script>
            
            function filters(){
                let input=document.getElementById("research").value.toLowerCase();
                let list=document.getElementById("productList");
                let items=list.querySelectorAll("li");

                        for(let i=0; i < items.length ;i++){
                            let text= items[i].textContent.toLowerCase();
                            if(text.includes(input)){
                                items[i].textContent=items[i].textContent;
                            }else{
                                items[i].textContent="";
                            }
                        }
                 /* (css)ممكن اعرض او اخفي العناصر بالاستعانه بال      
                 items[i].style.display="list-item";
                 items[i].style.display="none";
                */
            }
            
           

    </script>
    </body>
</html>
