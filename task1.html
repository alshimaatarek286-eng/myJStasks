<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="description" content="Hobbies" />
        <title>Enter your data </title>
        <style>
         
            body {
        font-family: Tahoma, Arial;
        background: #f5f7fa;
        color: #5a475a;
        text-align: center;
        direction: itr;
    }
        h1 { color: #ba97be; }
        #searchBox {
        width: 250px;
        padding: 8px;
        font-size: 14px;
        margin: 10px;
        border: 1px solid #aaa;
        border-radius: 5px;
    }
        button {
        padding: 8px 15px;
        margin: 5px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background: #b693b3;
        color: white;
        font-size: 14px;
    }
          
            </style>
        
    </head>
    <body>
        <h1><u>Enter Your Data</u></h1>
        <form onsubmit="showData();return false;" >

            <div><input type="text" id="userName" placeholder="name" required></div>
            <br>
            <div><input type="numbers" id="userAge" placeholder="age" required></div>
            <br>
            <div><input type="text" id="userHobby" placeholder="hobby" required></div>
            <br>
            <div><button type="submit">submit</button></div>
            <br>
        </form>
            <div  id="result">
                <p id="displayName"></p>
                <p id="displayAge"></p>
                <p id="displayHobby"></p></div>
        <script>
             function showData(){
                let name=document.getElementById("userName").value;
                let age=document.getElementById("userAge").value;
                let hobby=document.getElementById("userHobby").value;
                
               

                 document.getElementById("displayName","displayAge","displayHobby").innerHTML
                = "your name is: " + name + " " +" age is: " + age + " " + " hobby is: " + hobby ;

             }

        </script>
       
    </body>
</html>
