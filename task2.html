<body>
    <h1><u>Enter Your Numbers</u></h1>
        <form  onsubmit="return false;"  >

            <div>
                <input type="number" id="firstNumber" placeholder="Enter Your FirstNumber" required>    
                <input type="number" id="secondNumber" placeholder="Enter Your SecondNumber" required>
            </div>
            <br>
            <div>
                <button type="button"  onclick="calculate('add')"> Add+ </button>
                <button type="button"  onclick="calculate('subtract')"> Subtract- </button>
                <button type="button"  onclick="calculate('multiply')"> multiply* </button>
                <button type="button"  onclick="calculate('divide')"> divide/ </button>
            </div>    
             
            <br>
            </form>
            <div  id="resultArea">
                <p id="finalResult"> </p>
                
            </div>
<script>
        function calculate(operation) {
                let n1=Number(document.getElementById("firstNumber").value);
                let n2=Number(document.getElementById("secondNumber").value);
                let display =document.getElementById("finalResult");
                 let result;
                 
                if (operation === 'add') {
                result = n1 + n2;
                } else if (operation === 'subtract') {
                result = n1 - n2;
                } else if (operation === 'multiply') {
                result = n1 * n2;
                } else if (operation === 'divide') {
                result = n2 !== 0 ? n1 / n2 : "خطأ: قسمة على صفر";
            }
            
        display.innerHTML  = `<h1> ${result}</h1>` ;
            
        }
