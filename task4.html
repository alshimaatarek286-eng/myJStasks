<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="description" content="ToDo list" />
        <title>to do list </title>
        <style>
         
        body {
        font-family: Tahoma, Arial;
        background: #f5f7fa;
        color: #5a475a;
        text-align: center;
        direction: itr;
    }
        h1 { color: #ba97be; }
        .searchBox {
        width: 250px;
        padding: 8px;
        font-size: 14px;
        margin: 10px;
        border: 1px solid #aaa;
        border-radius: 5px;
    }
        button {
        padding: 8px 15px;
        margin: 5px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background: #b693b3;
        color: white;
        font-size: 14px;
    }

        </style>
        
    </head>
    <body>
        <h1><u>Enter You Daily List</u></h1>
       
        <div>
            <input type="text" id="taskInput" placeholder="enter your task " />
        </div>
        <br>
        <div>
            <button type="button"  onclick="addTask()"> add </button>
            <button type="button"  onclick="sorting()">sort</button>
        </div>
        <div>
            <ul id="taskList" ></ul>
        </div> 
        
        

        <script>
            let tasks =[];
            function addTask(){
                let input=document.getElementById("taskInput").value;
                 tasks.push(input);
                 renderTasks()
                
            }
            
            function sorting(){
                tasks.sort();
                renderTasks();
            }
             function renderTasks(){
                let list=document.getElementById("taskList");
                list.innerHTML="";
                tasks.forEach(function(task){
                list.innerHTML+= `<li> <input type="checkbox">${task}</li>`;
                
                });
            }
            
        </script>
        
    </body>
</html>
